<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Max Blumberg — Film Photography</title>
  <meta name="description" content="Film photography and black & white work by Max Blumberg." />

  <link rel="stylesheet" href="assets/photo.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YKML4BQEXJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YKML4BQEXJ');
  </script>
</head>
<body>

<header class="photo-banner">
  <div class="container">
    <h1 class="photo-heading">Film Photography</h1>
    <p class="photo-intro">Black &amp; white film work and prints.</p>
  </div>
</header>

<main class="photography-section">
  <div class="container">
    <div class="photo-grid">
      <!-- Example photo slots; replace img srcs with your images -->
      <div class="photo-slot"><img src="assets/photo1.jpg" alt="Film photo 1" loading="lazy"></div>
      <div class="photo-slot"><img src="assets/photo2.jpg" alt="Film photo 2" loading="lazy"></div>
      <div class="photo-slot"><img src="assets/photo3.jpg" alt="Film photo 3" loading="lazy"></div>
      <div class="photo-slot"><img src="assets/photo4.jpg" alt="Film photo 4" loading="lazy"></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <p>&copy; <span id="year-photo"></span> Max Blumberg</p>
  </div>
</footer>

<script>
  document.getElementById('year-photo').textContent = new Date().getFullYear();
</script>

</body>
</html>
